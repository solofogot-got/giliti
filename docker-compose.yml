services:
  db:
    image: postgres:15-alpine
    container_name: giliti-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: giliti
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - giliti-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: giliti-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/giliti
      NEXTAUTH_URL: http://${DOMAIN_NAME}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - giliti-net

  nginx:
    image: nginx:alpine
    container_name: giliti-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
      - adminer
    networks:
      - giliti-net
    env_file: .env

  adminer:
    image: adminer
    container_name: giliti-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - giliti-net

  certbot:
    image: certbot/certbot
    container_name: giliti-certbot
    restart: unless-stopped
    volumes:
      - certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $$!; done'"
    networks:
      - giliti-net

volumes:
  pgdata:
  certs:
  certbot_www:
  nginx_logs:

networks:
  giliti-net:
    driver: bridge
